name: Release Readiness

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run release validation
        run: python3 scripts/validate_gate_set.py . --profile release
