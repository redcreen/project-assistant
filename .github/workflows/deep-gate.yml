name: Deep Gate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deep-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run deep validation
        run: python3 scripts/validate_gate_set.py . --profile deep
